<!-- ОБЩИЙ КОНТЕЙНЕР: Центрирует весь контент, задает отступы 192px по бокам -->
<div class="container-fixed">

    <!-- ============================================
         HEADER: Шапка сайта (логотип, меню, контакты)
         ============================================ -->
    <header class="header">
        <!-- Внутренний контейнер для выравнивания -->
        <div class="container">

            <!-- ПЕРВЫЙ РЯД: Логотип + Навигация + Контакты -->
            <div class="header-top">

                <!-- Логотип -->
                <div class="logo">СЧАСТЬЕ</div>

                <!-- Навигационное меню добовляем заглушку-->
                <nav class="nav">
<!--                <a href="#" onclick="showCatalogMessage(); return false;">Каталог</a>-->
                    <a href="#">Спецпредложения</a>
                    <a href="#">Портфолио</a>
                    <a href="#">Доставка и оплата</a>
                    <a href="#">Контакты</a>
                    <a href="#">О нас</a>
                </nav>

                <!-- Контактная информация -->
                <div class="header-contacts">
                    <!-- Телефон -->
                    <div class="contact-item">
                        <div class="contact-phone">+7 (812) 425-30-99</div>
                        <div class="contact-dept">Отдел продаж</div>
                    </div>
                    <!-- Email 1 -->
                    <div class="contact-item">
                        <!-- Активная ссылка на почту -->
                        <a href="mailto:pro.schastie@mail.ru" class="contact-email">
                            pro.schastie@mail.ru
                        </a>
                        <div class="contact-dept">Отдел продаж</div>
                    </div>

                    <!-- Email 2 -->
                    <div class="contact-item">
                        <a href="mailto:01@schaste.ru" class="contact-email">
                            01@schaste.ru
                        </a>
                        <div class="contact-dept">Отдел закупок</div>
                    </div>
                </div>
            </div>

            <!-- ВТОРОЙ РЯД: Каталог + Поиск + Мин.сумма + Корзина -->
            <div class="header-bottom">

                <!-- Кнопка "Каталог" добавили заглушку onclick="showCatalogMessage()"-->
<!--                <button class="btn btn-catalog">onclick="showCatalogMessage()" -->
                <a href="catalog.html" class="btn btn-catalog" style="text-decoration: none; display: inline-flex">
                    <!-- Иконка сетки (4 квадрата) -->
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="2" y="2" width="5" height="5" rx="1"/>
                        <rect x="9" y="2" width="5" height="5" rx="1"/>
                        <rect x="2" y="9" width="5" height="5" rx="1"/>
                        <rect x="9" y="9" width="5" height="5" rx="1"/>
                    </svg>
                    <span>Каталог</span>
                </a>

                <!-- Поле поиска -->
                <div class="search">
                    <input type="text" placeholder="Поиск" class="search-input">
                    <!-- Иконка лупы -->
                    <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                    </svg>
                </div>

                <!-- Блок "Минимальная сумма заказа" -->
                <div class="min-order">
                    <span class="min-order-price">50 000 ₽</span>
                    <span class="min-order-label">минимальная<br>сумма заказа</span>
                </div>

                <!-- Кнопка "Корзина" -->
<!--                <button class="btn btn-cart" onclick="window.location.href='cart.html'">-->
                    <a href="catalog.html" class="btn btn-cart" style="text-decoration: none; display: inline-flex">
                    <!-- Иконка корзины -->
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358
                        5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1
                        1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5
                        0 100-3 1.5 1.5 0 000 3z"/>
                    </svg>
                    <span>Корзина</span>
                    <span class="cart-count" id="cartCount">0</span>
                </a>

            </div>
        </div>
    </header>
</div>  <!-- Закрываем container-fixed (header вне main) -->
